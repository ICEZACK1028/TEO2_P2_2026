version: "3.8"

services:
  backend:
    build:
      context: ./backend
    container_name: flash_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - flash_db:/app/data
    environment:
      - PORT=3000
      - JWT_SECRET=flash_delivery_secret_2026
      - DB_PATH=/app/data/flash_delivery.db
    networks:
      - flash_network

  frontend:
    build:
      context: ./frontend
    container_name: flash_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - flash_network

networks:
  flash_network:
    driver: bridge

volumes:
  flash_db:
